<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile • Aruna.otherworld</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --border-color: #dbdbdb;
            --text-primary: #262626;
            --text-secondary: #8e8e8e;
            --link-color: #00376b;
            --max-width: 935px;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --loader-speed: 0.8s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Loading Screen */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #a8a8a8;
            border-radius: 50%;
            animation: spin var(--loader-speed) linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #app-content {
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        /* Navigation */
        nav {
            height: 60px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-content {
            width: 100%;
            max-width: var(--max-width);
            padding: 0 20px;
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Container */
        .container {
            max-width: var(--max-width);
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Profile Header */
        header.profile-header {
            display: flex;
            margin-bottom: 44px;
            align-items: flex-start;
        }

        .profile-image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            margin-right: 30px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border-color);
            padding: 2px;
        }

        .profile-info {
            flex: 2;
        }

        .profile-user-settings {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .username {
            font-size: 28px;
            font-weight: 300;
            margin-right: 20px;
        }

        .edit-button {
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 5px 9px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .profile-stats {
            display: flex;
            list-style: none;
            margin-bottom: 20px;
        }

        .profile-stats li {
            margin-right: 40px;
        }

        .profile-stats span {
            font-weight: 600;
        }

        .profile-bio {
            font-size: 16px;
        }

        .profile-real-name {
            font-weight: 600;
            display: block;
        }

        .profile-category {
            color: var(--text-secondary);
            display: block;
        }

        /* Grid Section */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            border-top: 1px solid var(--border-color);
            padding-top: 40px;
        }

        .post-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #efefef;
            overflow: hidden;
            cursor: pointer;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.2s ease-in-out;
        }

        .post-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            transition: opacity 0.2s ease;
            font-weight: 600;
        }

        .post-item:hover .post-overlay {
            opacity: 1;
        }

        /* Post Viewer Modal */
        #post-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 1000;
            display: none;
            overflow-y: auto;
        }

        .viewer-header {
            height: 60px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1001;
        }

        .back-button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-right: 20px;
        }

        .viewer-feed {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .feed-post {
            background: white;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            border-radius: 3px;
        }

        .feed-post-header {
            display: flex;
            align-items: center;
            padding: 14px;
        }

        .feed-post-header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
        }

        .feed-post-header span {
            font-weight: 600;
            font-size: 14px;
        }

        .feed-post-img {
            width: 100%;
            display: block;
        }

        .feed-post-content {
            padding: 12px 16px;
        }

        .feed-actions {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
            font-size: 20px;
        }

        .feed-likes {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        .feed-caption {
            font-size: 14px;
            line-height: 1.4;
        }

        .feed-caption strong {
            margin-right: 6px;
        }

        .feed-date {
            color: var(--text-secondary);
            font-size: 10px;
            text-transform: uppercase;
            margin-top: 8px;
            display: block;
        }

        /* Responsive */
        @media screen and (max-width: 735px) {
            .container { margin: 0; padding: 0; }
            header.profile-header { padding: 16px; margin-bottom: 0; }
            .profile-image { width: 77px; height: 77px; }
            .profile-image-container { margin-right: 0; }
            .username { font-size: 20px; }
            .posts-grid { gap: 3px; padding-top: 0; }
            .profile-stats {
                display: flex;
                justify-content: space-around;
                border-top: 1px solid var(--border-color);
                padding: 12px 0;
            }
            .profile-stats li {
                margin-right: 0;
                text-align: center;
                font-size: 14px;
                display: flex;
                flex-direction: column;
            }
            .viewer-feed { width: 100%; }
            .feed-post { border-left: none; border-right: none; border-radius: 0; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="spinner"></div>
    </div>

    <div id="app-content">
        <nav>
            <div class="nav-content" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                Instagram
            </div>
        </nav>

        <div class="container">
            <header class="profile-header">
                <div class="profile-image-container">
                    <img src="post 2e.webp" alt="Profile Picture" class="profile-image">
                </div>

                <section class="profile-info">
                    <div class="profile-user-settings">
                        <h1 class="username">Aruna.otherworld</h1>
                        <button class="edit-button">Edit Profil</button>
                    </div>

                    <ul class="profile-stats">
                        <li><span>9</span> kiriman</li>
                        <li><span>1.2k</span> pengikut</li>
                        <li><span>450</span> diikuti</li>
                    </ul>

                    <div class="profile-bio">
                        <span class="profile-real-name">Aruna</span>
                        <span class="profile-category">Musik & Seni</span>
                        <p>Hidup dalam melodi 🎻 | Grateful daughter ✨</p>
                    </div>
                </section>
            </header>

            <main class="posts-grid" id="main-grid"></main>
        </div>
    </div>

    <div id="post-viewer">
        <div class="viewer-header">
            <button class="back-button" id="close-viewer">←</button>
            <span style="font-weight: 600;">Kiriman</span>
        </div>
        <div class="viewer-feed" id="viewer-feed"></div>
    </div>

    <script>
        const postsData = [
            { id: 1, img: 'post 1.webp', likes: 145, comments: 8, caption: 'Thank you ma for the support❤️', date: '1 hari yang lalu' },
            { id: 2, img: 'post 2e.webp', likes: 230, comments: 15, caption: 'Practice makes perfect #violin🎻', date: '3 hari yang lalu' },
            { id: 3, img: 'post 3e.webp', likes: 189, comments: 12, caption: '@jenadebora☺️❤️', date: '5 hari yang lalu' },
            { id: 4, img: 'post 4.webp', likes: 167, comments: 10, caption: 'Always grateful cause I have the best mom', date: '1 minggu yang lalu' },
            { id: 5, img: 'post 5e.webp', likes: 412, comments: 34, caption: 'Finally! Kerja keras latihan setiap malam akhirnya membuahkan hasil. Trofi ini Aruna persembahkan untuk Papa dan Mama. 🏆✨', date: '1 minggu yang lalu' },
            { id: 6, img: 'post 6.webp', likes: 320, comments: 21, caption: 'Kemenangan ini terasa lebih manis karena ada Mama di sampingku. Terima kasih doanya yang nggak pernah putus ya, Ma! ❤️ piala ini buat kita!', date: '2 minggu yang lalu' },
            { id: 7, img: 'post 7.webp', likes: 215, comments: 11, caption: 'Bangga bisa membawa pulang penghargaan untuk sekolah. Perjalanan masih panjang, semangat terus Aruna! 💪🎻 #achievement #schoollife', date: '3 minggu yang lalu' },
            { id: 8, img: 'post 8e.webp', likes: 502, comments: 45, caption: 'Silver Medal! 🥈 #grateful! ✨', date: '1 bulan yang lalu' },
            { id: 9, img: 'post9e.webp', likes: 280, comments: 18, caption: 'Time for the show! Nervous, tapi asik banget🔥 Semoga melodiku bisa sampai ke hati kalian semua🎻🎶', date: '1 bulan yang lalu' }
        ];

        const gridContainer = document.getElementById('main-grid');
        const viewerFeed = document.getElementById('viewer-feed');
        const postViewer = document.getElementById('post-viewer');
        const closeViewerBtn = document.getElementById('close-viewer');

        function initGrid() {
            postsData.forEach(post => {
                const postDiv = document.createElement('div');
                postDiv.className = 'post-item';
                postDiv.innerHTML = `
                    <img src="${post.img}" alt="Post ${post.id}">
                    <div class="post-overlay">❤️ ${post.likes} &nbsp; 💬 ${post.comments}</div>
                `;
                postDiv.onclick = () => openPost(post.id);
                gridContainer.appendChild(postDiv);
            });
        }

        function initFeed() {
            postsData.forEach(post => {
                const postCard = document.createElement('div');
                postCard.className = 'feed-post';
                postCard.id = `post-view-${post.id}`;
                postCard.innerHTML = `
                    <div class="feed-post-header">
                        <img src="post 2e.webp" alt="pfp">
                        <span>Aruna.otherworld</span>
                    </div>
                    <img src="${post.img}" class="feed-post-img" alt="Post">
                    <div class="feed-post-content">
                        <div class="feed-actions">
                            <span>❤️</span> <span>💬</span> <span>✈️</span>
                        </div>
                        <span class="feed-likes">${post.likes} Suka</span>
                        <div class="feed-caption">
                            <strong>Aruna.otherworld</strong> ${post.caption}
                        </div>
                        <span class="feed-date">${post.date}</span>
                    </div>
                `;
                viewerFeed.appendChild(postCard);
            });
        }

        function openPost(id) {
            postViewer.style.display = 'block';
            document.body.style.overflow = 'hidden';
            const targetPost = document.getElementById(`post-view-${id}`);
            if (targetPost) {
                targetPost.scrollIntoView();
            }
        }

        closeViewerBtn.onclick = () => {
            postViewer.style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        document.addEventListener('DOMContentLoaded', () => {
            initGrid();
            initFeed();
            setTimeout(() => {
                document.getElementById('app-content').style.display = 'block';
                const loader = document.getElementById('loader-wrapper');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                setTimeout(() => {
                    document.getElementById('app-content').style.opacity = '1';
                }, 50);
            }, 1500);
        });
    </script>
</body>
</html>
